<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Scan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px;
    overflow: hidden;
    font-family: 'Georgia', serif;
    background: #0d0a14;
  }

  /* Background radial glow */
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 70% at 50% 55%, #1a0a2e 0%, #0d0a14 100%);
  }

  /* Warm ambient glow behind figure */
  .glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -48%);
    width: 340px; height: 420px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(160,80,180,0.18) 0%, rgba(100,40,140,0.08) 50%, transparent 75%);
  }
  .glow-warm {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -44%);
    width: 200px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(220,140,80,0.12) 0%, transparent 70%);
  }

  /* SVG silhouette */
  .figure {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 180px;
    opacity: 0;
    animation: riseIn 1.6s ease 0.3s forwards;
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translate(-50%, -46%); }
    to   { opacity: 1; transform: translate(-50%, -50%); }
  }

  /* Particle dots */
  .particles {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .dot {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: rgba(200,160,240,0.4);
    animation: floatDot linear infinite;
  }

  @keyframes floatDot {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-180px) scale(0.4); opacity: 0; }
  }

  /* Text */
  .text-panel {
    position: absolute;
    bottom: 52px; left: 0; right: 0;
    text-align: center;
    opacity: 0;
    animation: fadeIn 1s ease 1.2s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .main-text {
    font-size: 36px;
    font-weight: normal;
    color: #f0eaff;
    letter-spacing: 0.04em;
    line-height: 1.4;
    text-shadow: 0 0 40px rgba(180,120,240,0.4);
  }

  .breath-line {
    display: block;
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,160,240,0.5), transparent);
    margin: 14px auto 0;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { width: 40px; opacity: 0.4; }
    50%       { width: 80px; opacity: 0.9; }
  }

  /* Breathing ring around figure */
  .ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 220px; height: 320px;
    border-radius: 50%;
    border: 1px solid rgba(200,160,240,0.15);
    animation: breathRing 4s ease-in-out infinite;
  }
  .ring2 {
    width: 260px; height: 370px;
    border-color: rgba(200,160,240,0.07);
    animation: breathRing 4s ease-in-out infinite 0.6s;
  }

  @keyframes breathRing {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50%       { transform: translate(-50%, -50%) scale(1.06); opacity: 1; }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="glow"></div>
<div class="glow-warm"></div>

<!-- Breathing rings -->
<div class="ring"></div>
<div class="ring ring2"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Human silhouette SVG -->
<svg class="figure" viewBox="0 0 180 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <ellipse cx="90" cy="38" rx="28" ry="33" fill="rgba(220,190,255,0.25)" stroke="rgba(220,190,255,0.5)" stroke-width="1.5"/>
  <!-- Neck -->
  <rect x="80" y="68" width="20" height="20" rx="4" fill="rgba(220,190,255,0.18)" stroke="rgba(220,190,255,0.4)" stroke-width="1"/>
  <!-- Torso -->
  <path d="M52 88 Q44 100 42 140 Q40 175 48 200 Q60 215 90 218 Q120 215 132 200 Q140 175 138 140 Q136 100 128 88 Q112 82 90 80 Q68 82 52 88Z" fill="rgba(220,190,255,0.15)" stroke="rgba(220,190,255,0.4)" stroke-width="1.5"/>
  <!-- Left arm -->
  <path d="M52 95 Q30 120 24 160 Q20 185 28 200" stroke="rgba(220,190,255,0.45)" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Right arm -->
  <path d="M128 95 Q150 120 156 160 Q160 185 152 200" stroke="rgba(220,190,255,0.45)" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Left leg -->
  <path d="M68 218 Q62 270 58 320 Q55 355 60 390" stroke="rgba(220,190,255,0.4)" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Right leg -->
  <path d="M112 218 Q118 270 122 320 Q125 355 120 390" stroke="rgba(220,190,255,0.4)" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Heart glow -->
  <circle cx="90" cy="148" r="8" fill="rgba(255,160,180,0.25)" stroke="rgba(255,160,180,0.5)" stroke-width="1">
    <animate attributeName="r" values="7;10;7" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Stomach -->
  <circle cx="90" cy="185" r="5" fill="rgba(255,200,120,0.2)" stroke="rgba(255,200,120,0.4)" stroke-width="1">
    <animate attributeName="r" values="4;6;4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Throat -->
  <circle cx="90" cy="78" r="4" fill="rgba(180,220,255,0.2)" stroke="rgba(180,220,255,0.4)" stroke-width="1">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>

<div class="text-panel">
  <div class="main-text">Chiudi gli occhi.&nbsp;&nbsp;Respira.</div>
  <span class="breath-line"></span>
</div>

<script>
  const p = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.style.left = (30 + Math.random() * 40) + '%';
    d.style.top = (20 + Math.random() * 55) + '%';
    d.style.animationDuration = (5 + Math.random() * 8) + 's';
    d.style.animationDelay = (Math.random() * 6) + 's';
    d.style.width = d.style.height = (1.5 + Math.random() * 2.5) + 'px';
    p.appendChild(d);
  }
</script>

</body>
</html>
